<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Oferta Especial</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #0f0f0f;
      color: #fff;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .upsell-block {
      background-color: #1a1a1a;
      border: 1px solid #2e2e2e;
      border-radius: 12px;
      padding: 40px 32px;
      max-width: 680px;
      width: 100%;
      text-align: center;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5);
    }

    .upsell-block h1 {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 8px;
      color: #ffffff;
    }

    .upsell-block p.subtitle {
      font-size: 1rem;
      color: #aaaaaa;
      margin-bottom: 28px;
    }

    /* Área do vídeo */
    .video-wrapper {
      position: relative;
      width: 100%;
      padding-top: 56.25%; /* 16:9 */
      background-color: #000;
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 32px;
    }

    .video-wrapper iframe,
    .video-wrapper video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    @media (max-width: 480px) {
      .upsell-block {
        padding: 28px 20px;
      }

      .upsell-block h1 {
        font-size: 1.4rem;
      }
    }
  </style>
</head>
<body>

  <div class="upsell-block">
    <h1>Oferta Especial para Você!</h1>
    <p class="subtitle">Assista ao vídeo abaixo e aproveite essa oportunidade única</p>

    <!-- VÍDEO: substitua o src pelo embed do seu vídeo (YouTube, Vimeo, etc.) -->
    <div class="video-wrapper">
      <iframe
        src="https://www.youtube.com/embed/dQw4w9WgXcQ"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        allowfullscreen>
      </iframe>
    </div>

    <!-- HOTMART - Sales Funnel Widget -->
    <div id="hotmart-sales-funnel"></div>
    <script src="https://checkout.hotmart.com/lib/hotmart-checkout-elements.js"></script>
    <script>
      checkoutElements.init('salesFunnel').mount('#hotmart-sales-funnel')
    </script>
    <!-- HOTMART - Sales Funnel Widget -->
  </div>

</body>
</html>
