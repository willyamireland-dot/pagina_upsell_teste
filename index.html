<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Oferta Especial</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #0f0f0f;
      color: #fff;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .upsell-block {
      background-color: #1a1a1a;
      border: 1px solid #2e2e2e;
      border-radius: 12px;
      padding: 40px 32px;
      max-width: 680px;
      width: 100%;
      text-align: center;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5);
    }

    .upsell-block h1 {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 8px;
      color: #ffffff;
    }

    .upsell-block p.subtitle {
      font-size: 1rem;
      color: #aaaaaa;
      margin-bottom: 28px;
    }

    /* Área do vídeo */
    .video-wrapper {
      position: relative;
      width: 100%;
      padding-top: 56.25%; /* 16:9 */
      background-color: #000;
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 32px;
    }

    .video-wrapper iframe,
    .video-wrapper video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    /* Botões */
    .buttons {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .btn-sim {
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: #fff;
      font-size: 1.1rem;
      font-weight: 700;
      padding: 18px 24px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .btn-sim:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(34, 197, 94, 0.4);
    }

    .btn-nao {
      background: transparent;
      color: #666;
      font-size: 0.85rem;
      padding: 12px 24px;
      border: 1px solid #333;
      border-radius: 8px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
      text-decoration: none;
      display: block;
    }

    .btn-nao:hover {
      color: #999;
      border-color: #555;
    }

    @media (max-width: 480px) {
      .upsell-block {
        padding: 28px 20px;
      }

      .upsell-block h1 {
        font-size: 1.4rem;
      }
    }
  </style>
</head>
<body>

  <div class="upsell-block">
    <h1>Oferta Especial para Você!</h1>
    <p class="subtitle">Assista ao vídeo abaixo e aproveite essa oportunidade única</p>

    <!-- VÍDEO: substitua o src pelo embed do seu vídeo (YouTube, Vimeo, etc.) -->
    <div class="video-wrapper">
      <iframe
        src="https://www.youtube.com/embed/dQw4w9WgXcQ"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        allowfullscreen>
      </iframe>
    </div>

    <!-- BOTÕES -->
    <div class="buttons">
      <button class="btn-sim" onclick="handleSim()">
        ✅ Sim! Eu Quero Aproveitar Essa Oferta
      </button>
      <a href="#" class="btn-nao" onclick="handleNao(event)">
        Não, obrigado. Não quero essa oferta.
      </a>
    </div>
  </div>

  <script>
    function handleSim() {
      // Redirecione para a página de checkout ou próxima etapa
      alert('Ótimo! Redirecionando para o checkout...');
      // window.location.href = 'https://seu-checkout.com';
    }

    function handleNao(e) {
      e.preventDefault();
      // Redirecione para a próxima página ou página de obrigado
      alert('Tudo bem! Redirecionando...');
      // window.location.href = 'https://obrigado.com';
    }
  </script>

</body>
</html>
